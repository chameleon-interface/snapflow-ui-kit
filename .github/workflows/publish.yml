name: Publish to NPM
on:
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
jobs:
  version-from-comment:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/version ')
    permissions:
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Parse bump type
        id: parse
        shell: bash
        run: |
          set -euo pipefail
          comment='${{ github.event.comment.body }}'
          bump="${comment#"/version "}"
          bump="$(echo "$bump" | tr -d '\r' | xargs)"
          case "$bump" in
            patch|minor|major|prerelease|prepatch|preminor|premajor)
              echo "bump=$bump" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported bump type: '$bump'"
              echo "Use: /version patch|minor|major|prerelease|prepatch|preminor|premajor"
              exit 1
              ;;
          esac

      - name: Load pull request context
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr_number='${{ github.event.issue.number }}'
          pr_json="$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$pr_number")"

          head_ref="$(echo "$pr_json" | jq -r '.head.ref')"
          head_repo="$(echo "$pr_json" | jq -r '.head.repo.full_name')"
          base_ref="$(echo "$pr_json" | jq -r '.base.ref')"

          echo "head_ref=$head_ref" >> "$GITHUB_OUTPUT"
          echo "head_repo=$head_repo" >> "$GITHUB_OUTPUT"
          echo "base_ref=$base_ref" >> "$GITHUB_OUTPUT"

      - name: Validate PR target and source
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.pr.outputs.base_ref }}" != "main" ]]; then
            echo "Skipping: PR base is '${{ steps.pr.outputs.base_ref }}' (expected 'main')."
            echo "can_proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ steps.pr.outputs.head_repo }}" != "${{ github.repository }}" ]]; then
            echo "Skipping: PR branch is from fork ('${{ steps.pr.outputs.head_repo }}')."
            echo "can_proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "can_proceed=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.guard.outputs.can_proceed == 'true'
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        if: steps.guard.outputs.can_proceed == 'true'
        with:
          version: 10.28.2

      - name: Use Node.js 20
        if: steps.guard.outputs.can_proceed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Bump package version
        if: steps.guard.outputs.can_proceed == 'true'
        run: pnpm version ${{ steps.parse.outputs.bump }} --no-git-tag-version

      - name: Commit and push version bump
        if: steps.guard.outputs.can_proceed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          version="$(node -p "require('./package.json').version")"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): bump version to v$version"
          git push origin "HEAD:${{ steps.pr.outputs.head_ref }}"

  publish:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build lib
        run: pnpm run build
      - uses: JS-DevTools/npm-publish@v3
        with:
          token: ${{ secrets.NPM_PUBLISH_TOKEN }}
          access: 'public'
